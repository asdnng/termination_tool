<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <title>SRS Termination Checker</title>
    <style>
        body{font-family:sans-serif;max-width:800px;margin:auto}
        textarea{width:100%;height:8rem}
        pre{background:#f4f4f4;padding:1rem;white-space:pre-wrap}
    </style>
</head>
<body>
<h1>SRS Termination Checker</h1>
<form id="ruleForm">
    <p><b>Input:</b> Either JSON<br>
        <code>{"rules":[{"left":"a","right":"b"},...]}</code><br>
        or one rule per line like <code>a -> b</code></p>
    <textarea id="rules"></textarea><br>
    <button type="submit">Check</button>
</form>

<h2>Result</h2>
<pre id="out">—</pre>

<script>
    const form = document.getElementById('ruleForm');
    form.addEventListener('submit', async e => {
      e.preventDefault();
      const txt = document.getElementById('rules').value.trim();
      if (!txt) {
        document.getElementById('out').textContent = '⚠️ Please enter rules.';
        return;
      }
      let payload;
      try {
        if (txt.startsWith('{')) {
          payload = JSON.parse(txt);
        } else {
         const lines = txt.split(/\n+/).filter(Boolean);;
          const rules = lines.map(line => {
            const sepRegex = /->|→/;
            if (!sepRegex.test(line)) {
              throw new Error(`Invalid rule format: "${line}"`);
            }
            const parts = line.split(sepRegex);
            const left = parts[0].trim();
            const right = parts[1].trim();
            if (!left || !right) {
              throw new Error(`Invalid rule: "${line}"`);
            }
            return { left, right };
          });
          payload = { rules };
        }
      } catch (err) {
        document.getElementById('out').textContent = '⚠️ Input error: ' + err.message;
        return;
      }
      try {
        const res = await fetch('/termination', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) {
          throw new Error(res.statusText);
        }
        const json = await res.json();
        document.getElementById('out').textContent = json.terminating
          ? `✓ Found polynomial interpretations. Terminating
    ${json.pretty}`
          : '✗ Could not find polynomial interpretations(Unknown)';
      } catch (err) {
        document.getElementById('out').textContent = '❌ Request failed: ' + err;
      }
    });
</script>
</body>
</html>
